name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semantic PR
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo, sqlite
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHP Pint
        run: composer lint

      - name: PHPStan
        run: composer analyze

  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    needs: [lint]
    # Skip tests on release-please branches to avoid duplicate runs (as they're already tested on PR)
    # except when it's a push to main (e.g. after merge)
    if: |
      !contains(github.event.head_commit.message, '--no-change') &&
      (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 11
          - php: "8.2"
            laravel: "^11.0"
            testbench: "^9.0"
          - php: "8.3"
            laravel: "^11.0"
            testbench: "^9.0"
          - php: "8.4"
            laravel: "^11.0"
            testbench: "^9.0"

          # Laravel 12
          - php: "8.2"
            laravel: "^12.0"
            testbench: "^10.0"
          - php: "8.3"
            laravel: "^12.0"
            testbench: "^10.0"
          - php: "8.4"
            laravel: "^12.0"
            testbench: "^10.0"
          - php: "8.5"
            laravel: "^12.0"
            testbench: "^10.0"

          # Laravel 13
          - php: "8.3"
            laravel: "^13.0"
            testbench: "^11.0"
          - php: "8.4"
            laravel: "^13.0"
            testbench: "^11.0"
          - php: "8.5"
            laravel: "^13.0"
            testbench: "^11.0"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, pdo, sqlite
          coverage: none

      - name: Install Composer dependencies
        run: |
          composer require \
          "illuminate/cache:${{ matrix.laravel }}" \
          "illuminate/container:${{ matrix.laravel }}" \
          "illuminate/database:${{ matrix.laravel }}" \
          "illuminate/log:${{ matrix.laravel }}" \
          "illuminate/support:${{ matrix.laravel }}" \
          "illuminate/http:${{ matrix.laravel }}" \
          "orchestra/testbench:${{ matrix.testbench }}" \
          --dev \
          --no-interaction \
          --no-update
          composer update --prefer-dist --no-interaction

      - name: Run Tests
        run: composer test
